<p class="eyebrow">Get in touch</p>
<h2 class="h-section">Let's build something</h2>
<p class="lead-lg text-muted-2 mb-4" style="max-width: 54ch">
  Tell us about your project or idea, and we'll get back to you.
</p>

<form [formGroup]="contactForm" (ngSubmit)="submitContactForm()" novalidate class="contact-form">
  <div class="row g-3">
    <div class="col-md-6">
      <label for="name" class="form-label required">Your name</label>
      <input
        type="text"
        id="name"
        name="name"
        formControlName="name"
        aria-required="true"
        autocomplete="name"
        [class.is-invalid]="contactForm.controls.name.invalid && contactForm.controls.name.touched"
        [attr.aria-invalid]="
          contactForm.controls.name.invalid && contactForm.controls.name.touched ? 'true' : null
        "
        [attr.aria-describedby]="
          contactForm.controls.name.invalid && contactForm.controls.name.touched ? 'name-err' : null
        "
        class="form-control form-control-lg"
        placeholder="Name" />
      <div id="name-err" class="invalid-feedback">Name is required.</div>
    </div>

    <div class="col-md-6">
      <label for="email" class="form-label required">Your email</label>
      <input
        type="email"
        id="email"
        name="email"
        formControlName="email"
        aria-required="true"
        autocomplete="email"
        [class.is-invalid]="contactForm.controls.email.invalid && contactForm.controls.email.touched"
        [attr.aria-invalid]="
          contactForm.controls.email.invalid && contactForm.controls.email.touched ? 'true' : null
        "
        [attr.aria-describedby]="
          contactForm.controls.email.invalid && contactForm.controls.email.touched ? 'email-err' : null
        "
        class="form-control form-control-lg"
        placeholder="you@example.com" />
      <div id="email-err" class="invalid-feedback">Please enter a valid email address.</div>
    </div>

    <div class="col-12">
      <label for="subject" class="form-label">Subject</label>
      <input
        type="text"
        id="subject"
        name="subject"
        formControlName="subject"
        class="form-control form-control-lg"
        placeholder="What's this about?" />
    </div>

    <div class="col-12">
      <label for="body" class="form-label">Your message</label>
      <textarea
        id="body"
        formControlName="body"
        class="form-control"
        rows="6"
        placeholder="Tell us about your project…"></textarea>
    </div>

    <!-- Honeypot: hidden from people; bots that fill it are silently dropped by the Worker -->
    <input
      type="text"
      formControlName="website"
      name="website"
      class="hp-field"
      tabindex="-1"
      autocomplete="off"
      aria-hidden="true" />

    @if (isBrowser) {
      <div class="col-12">
        <div #turnstile class="cf-turnstile-host"></div>
      </div>
    }

    <div class="col-12">
      <!-- Enabled even before Turnstile resolves: submit() guards on the token and
           guides the user (toast + focus to the widget). Disabling it removes it from
           the tab order and makes that guidance unreachable (WCAG 3.3.1 / 4.1.2). -->
      <button type="submit" class="btn btn-primary btn-lg" [disabled]="sending">
        {{ sending ? 'Sending…' : 'Send message' }}
        <app-icon name="paper-plane" class="ms-2"></app-icon>
      </button>
    </div>
  </div>
</form>
