<div #scrollPoint></div>

<p class="eyebrow">Get in touch</p>
<h2 class="h-section">Let's build something</h2>
<p class="lead-lg text-muted-2 mb-4" style="max-width: 54ch">
  Tell us about your project or idea, and we'll get back to you.
</p>

<form [formGroup]="contactForm" class="contact-form" ngSkipHydration>
  <div class="row g-3">
    <div class="col-md-6">
      <label for="name" class="form-label required">Your name</label>
      <input
        type="text"
        id="name"
        name="name"
        formControlName="name"
        [class.is-invalid]="contactForm.controls.name.invalid"
        class="form-control form-control-lg"
        placeholder="Name" />
      <div class="invalid-feedback">Name is required.</div>
    </div>

    <div class="col-md-6">
      <label for="email" class="form-label required">Your email</label>
      <input
        type="email"
        id="email"
        name="email"
        formControlName="email"
        [class.is-invalid]="contactForm.controls.email.invalid"
        class="form-control form-control-lg"
        placeholder="you@example.com" />
      <div class="invalid-feedback">Please enter a valid email address.</div>
    </div>

    <div class="col-12">
      <label for="subject" class="form-label">Subject</label>
      <input
        type="text"
        id="subject"
        name="subject"
        formControlName="subject"
        class="form-control form-control-lg"
        placeholder="What's this about?" />
    </div>

    <div class="col-12">
      <label for="body" class="form-label">Your message</label>
      <textarea
        id="body"
        formControlName="body"
        class="form-control"
        rows="6"
        aria-label="Your message"
        placeholder="Tell us about your project…"></textarea>
    </div>

    <div class="col-12">
      @if (isBrowser) {
        <re-captcha
          [formControlName]="'recaptcha'"
          name="captcha"
          theme="dark"
          (resolved)="resolved($event)"
          siteKey="6LcZleIUAAAAAMRW1yyDXvUHza9EBAesB0fKYMVz"
          [class.is-invalid]="contactForm.controls.recaptcha.invalid"></re-captcha>
      }
      <div class="invalid-feedback">reCAPTCHA required.</div>
    </div>

    <div class="col-12">
      <button
        class="btn btn-primary btn-lg"
        (click)="submitContactForm()"
        [disabled]="contactForm.invalid || !allowSubmit">
        Send message <i class="fas fa-paper-plane ms-2"></i>
      </button>
    </div>
  </div>
</form>
